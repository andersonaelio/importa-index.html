function esc(str){
  return String(str==null?'':str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- INSTALAR NO CELULAR ---------- */
let deferredInstallPrompt = null;
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
});

function promptInstall(){
  if(deferredInstallPrompt){
    deferredInstallPrompt.prompt();
    deferredInstallPrompt.userChoice.then(()=>{ deferredInstallPrompt = null; });
  } else if(isIOS){
    showIOSInstallSheet();
  } else {
    showIOSInstallSheet(true);
  }
}

function showIOSInstallSheet(generic){

let state = { view:'onboarding', onboardingStep:0, items:[], addStep:null, addType:null, draft:{} };

async function ensureAuth(){
  const { data: { session } } = await sb.auth.getSession();
  if(!session){
    const { error } = await sb.auth.signInAnonymously();
    if(error) console.error('erro de login anônimo', error);
  }
}

async function getSignedUrl(path){
  if(!path) return null;
  const { data, error } = await sb.storage.from('importa-fotos').createSignedUrl(path, 3600);
  if(error){ console.error('erro ao assinar url', error); return null; }
  return data.signedUrl;
}

async function uploadPhoto(dataUrl, prefix){
  try{
    const { data: { user } } = await sb.auth.getUser();
    const path = `${user.id}/${prefix}_${Date.now()}.jpg`;
    const blob = await (await fetch(dataUrl)).blob();
    const { error } = await sb.storage.from('importa-fotos').upload(path, blob, { contentType:'image/jpeg' });
    if(error){ console.error('erro ao subir foto', error); return null; }
    return path;
  } catch(e){ console.error('erro ao subir foto', e); return null; }
}

async function insertItem(tipo, nome, dados){
  const { data, error } = await sb.from('importa_itens').insert({ tipo, nome, dados }).select().single();
  if(error){ console.error('erro ao salvar', error); return null; }
  return data;
}

async function loadItems(){
  await ensureAuth();
  try{
    const { data, error } = await sb.from('importa_itens').select('*').order('criado_em', { ascending:true });
    if(error) throw error;
    state.items = await Promise.all((data||[]).map(async row=>{
      const item = { id: row.id, type: row.tipo, ...row.dados };
      if(row.tipo==='consulta') item.subject = row.nome;
      else item.name = row.nome;
      if(row.dados && row.dados.photo_path){ item.photoData = await getSignedUrl(row.dados.photo_path); }
      return item;
    }));
  } catch(e){ console.error('erro ao carregar itens', e); state.items = []; }
  render();
}

function daysBetween(a,b){ return Math.round((b-a)/86400000); }
function addYears(date, years){ const d=new Date(date); d.setFullYear(d.getFullYear()+years); return d; }
function fmtDate(d){ return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDateShort(d){ return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}); }

function beneficios(){ return state.items.filter(i=>i.type==='beneficio'); }
function documentos(){ return state.items.filter(i=>i.type==='documento'); }
function consultas(){ return state.items.filter(i=>i.type==='consulta'); }

function ringDash(renewedDate, cycleYears){
  const total = cycleYears*365;
  const elapsed = Math.max(0, daysBetween(new Date(renewedDate), new Date()));
  const frac = Math.min(1, elapsed/total);
  const filled = Math.round((1-frac)*88);
  return `${filled} ${88-filled}`;
}
function nextRenewal(renewedDate, cycleYears){ return addYears(renewedDate, cycleYears); }

function go(view, extra){ state.view = view; state.viewExtra = extra; closeSheet(); render(); }

/* ---------- SCREENS ---------- */

function screenHoje(){
  const upcomingConsultas = consultas().filter(c=>new Date(c.date) >= new Date(new Date().toDateString())).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const nextConsulta = upcomingConsultas[0];
  const bens = beneficios().map(b=>({...b, next: nextRenewal(b.renewedDate, b.cycleYears)})).sort((a,b)=>a.next-b.next);
  const soonBens = bens.filter(b=> daysBetween(new Date(), b.next) <= 90);
  const calmCount = state.items.length - (nextConsulta?1:0) - soonBens.length;

  let html = `<div class="greet">Oi</div><div class="subgreet">o que precisa de você agora</div>`;

  if(nextConsulta){
    html += `<div class="tag-attention"><span class="dot-amber"></span>Precisa de você</div>
    <div class="card" onclick="go('consultas')">
      <div class="card-title">${esc(nextConsulta.subject)||'Consulta'}</div>
      <div class="card-sub">${fmtDate(new Date(nextConsulta.date))}${nextConsulta.doctor? ' · '+esc(nextConsulta.doctor):''}</div>
    </div>`;
  }

  if(soonBens.length){
    html += `<div class="section-label">Nos próximos meses</div>`;
    soonBens.forEach(b=>{
      html += `<div class="card" onclick="go('beneficios')">
        <div class="card-note">${esc(b.name)} renova em ${fmtDate(b.next)}. Eu aviso quando chegar a hora.</div>
      </div>`;
    });
  }

  if(calmCount > 0){
    html += `<div class="calm-block"><div class="calm-txt">✓ Mais ${calmCount} ${calmCount===1?'item guardado':'itens guardados'} e em dia</div><span onclick="go('guardados')" aria-label="Ver Guardados" style="color:#3E5A44">›</span></div>`;
  }

  if(state.items.length===0){
    html += `<div class="empty-state">Nada guardado ainda.<br>Toque em + pra começar.</div>`;
  }

  document.getElementById('content').innerHTML = html;
}

function screenDocumentos(){
  const docs = documentos();
  let html = `<div class="back-row" onclick="go('guardados')">← Guardados</div><div class="title">Documentos</div>`;
  if(docs.length===0){
    html += `<div class="empty-state">Nenhum documento guardado ainda.</div>`;
  } else {
    docs.forEach(d=>{
      html += `<div class="list-row" onclick="go('documentoDetalhe', '${d.id}')">
        <div class="row-thumb">${d.photoData ? `<img src="${d.photoData}" alt="Foto de ${esc(d.name)}" style="width:100%;height:100%;object-fit:cover;border-radius:11px">` : '📋'}</div>
        <div class="row-info"><div class="row-name">${esc(d.name||'Documento sem nome')}</div><div class="row-meta">adicionado em ${fmtDate(new Date(d.addedDate))}</div></div>
      </div>`;
    });
  }
  document.getElementById('content').innerHTML = html;
}

function screenDocumentoDetalhe(){
  const d = state.items.find(i=>i.id===state.viewExtra);
  if(!d){ go('documentos'); return; }
  let html = `<div class="back-row" onclick="go('documentos')">← Documentos</div>
    <div class="title">${esc(d.name||'Documento sem nome')}</div>
    <div class="subgreet">adicionado em ${fmtDate(new Date(d.addedDate))}</div>`;
  if(d.photoData){
    html += `<img src="${d.photoData}" alt="Foto de ${esc(d.name)}" style="width:100%;border-radius:16px;box-shadow:0 1px 6px rgba(47,51,44,.08)">`;
  } else {
    html += `<div class="empty-state">Esse documento não tem foto anexada.</div>`;
  }

function printDoc(id){
  const d = state.items.find(i=>i.id===id);
  if(!d) return;
  const area = document.getElementById('printArea');
  area.innerHTML = `<h2>${esc(d.name)}</h2><p>Adicionado em ${fmtDate(new Date(d.addedDate))}</p>${d.photoData ? `<img src="${d.photoData}" style="max-width:100%">` : ''}`;
  window.print();
}

function confirmDelete(id, backTo, label){
  const sheet = document.getElementById('sheet');
  sheet.innerHTML = `<div class="sheet-handle"></div>
    <div class="sheet-title">Excluir "${label}"?</div>
    <div class="card"><div class="card-note">Isso apaga de vez, sem volta. Se for um laudo ou documento importante, prefira baixar uma cópia antes.</div></div>
    <button class="btn-primary" style="background:#A6493E" onclick="deleteItem('${id}','${backTo}')">Sim, excluir</button>
    <button class="btn-ghost" onclick="closeSheet()">Cancelar</button>`;
  a11yEnhance(sheet);
  document.getElementById('sheetOverlay').classList.add('open');
}

async function deleteItem(id, backTo){
  const { error } = await sb.from('importa_itens').delete().eq('id', id);
  if(error){ console.error('erro ao excluir', error); return; }
  state.items = state.items.filter(i=>i.id!==id);
  go(backTo);
}

function screenConsultas(){
  const all = consultas().sort((a,b)=>new Date(b.date)-new Date(a.date));
  const upcoming = all.filter(c=>new Date(c.date) >= new Date(new Date().toDateString())).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const past = all.filter(c=>new Date(c.date) < new Date(new Date().toDateString()));
  let html = `<div class="back-row" onclick="go('guardados')">← Guardados</div><div class="title">Consultas</div>`;
  if(upcoming.length){
    html += `<div class="section-label">Próxima</div>
    <div class="card">
      <div class="tag-attention"><span class="dot-amber"></span>${fmtDate(new Date(upcoming[0].date))}</div>
      <div class="card-title" style="margin-top:6px">${esc(upcoming[0].subject)}</div>
      <div class="card-sub">${esc(upcoming[0].doctor)}</div>
      ${upcoming[0].photoData ? `<img src="${upcoming[0].photoData}" alt="Foto anexada à consulta de ${esc(upcoming[0].subject)}" style="width:100%;border-radius:12px;margin-top:10px;display:block">` : ''}
    </div>`;
  }
  if(past.length){
    html += `<div class="section-label">Já aconteceram</div>`;
    past.forEach(c=>{
      html += `<div class="list-row" style="padding:12px 16px">
        <div class="row-info"><div class="row-name" style="font-size:14.5px">${esc(c.subject)}</div></div>
        <div class="row-meta">${fmtDateShort(new Date(c.date))}</div>
      </div>`;
    });
  }
  if(all.length===0) html += `<div class="empty-state">Nenhuma consulta guardada ainda.</div>`;
  document.getElementById('content').innerHTML = html;
}

/* ---------- ADD FLOW (sheet) ---------- */

function openAdd(){
  state.addStep='choose'; state.addType=null; state.draft={};
  renderSheet();
  document.getElementById('sheetOverlay').classList.add('open');
}
function closeSheet(){
  document.getElementById('sheetOverlay').classList.remove('open');
}

function chooseType(type){
  state.addType = type;
  state.addStep = type==='documento' ? 'doc' : type==='consulta' ? 'consulta' : 'beneficio-name';
  renderSheet();
}

function renderSheet(){
  let html = `<div class="sheet-handle"></div>`;
  if(state.addStep==='choose'){
    html += `<div class="sheet-title">O que você quer adicionar?</div>
    <div class="choice-card" onclick="chooseType('documento')"><div class="choice-name">📷 Guardar um documento</div><div class="choice-sub">laudo, receita… tire uma foto</div></div>
    <div class="choice-card" onclick="chooseType('beneficio')"><div class="choice-name">🌿 Acompanhar um benefício</div><div class="choice-sub">algo que renova de tempos em tempos</div></div>
    <div class="choice-card" onclick="chooseType('consulta')"><div class="choice-name">🩺 Marcar uma consulta</div><div class="choice-sub">um compromisso com data</div></div>`;
  }
  else if(state.addStep==='doc'){
    html += `<div class="sheet-title">Guardar documento</div>
    <div class="photo-box" id="photoBox_doc" onclick="document.getElementById('photoInput').click()" aria-label="Tirar ou escolher foto do documento">${state.draft.photoData ? `<img src="${state.draft.photoData}" alt="Foto do documento" style="width:100%;height:100%;object-fit:cover;border-radius:12px">` : '📷 Toque para tirar foto ou escolher da galeria'}</div>
    <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event,'documento')">
    <input class="field-input" id="docName" aria-label="Nome do documento" placeholder="ex: Laudo médico" value="${esc(state.draft.name||'')}">
    <button class="btn-primary" id="btnSaveDoc" onclick="saveDoc()">Guardar</button>
    <button class="btn-ghost" onclick="openAdd()">voltar</button>`;
  }
  else if(state.addStep==='consulta'){
    html += `<div class="sheet-title">Marcar consulta</div>
    <div class="field-label">Sobre o que é</div>
    <input class="field-input" id="cSubject" aria-label="Sobre o que é a consulta" placeholder="ex: Neurologista" value="${esc(state.draft.subject||'')}">
    <div class="field-label">Com quem (opcional)</div>
    <input class="field-input" id="cDoctor" aria-label="Com quem é a consulta" placeholder="ex: Dra. Marina">
    <div class="field-label">Data</div>
    <input class="field-input" type="date" id="cDate" aria-label="Data da consulta">
    <div class="photo-box" id="photoBox_consulta" onclick="document.getElementById('photoInput').click()" aria-label="Anexar foto da consulta, opcional">${state.draft.photoData ? `<img src="${state.draft.photoData}" alt="Foto anexada à consulta" style="width:100%;height:100%;object-fit:cover;border-radius:12px">` : '📷 Anexar foto (opcional)'}</div>
    <input type="file" id="photoInput" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(event,'consulta')">
    <button class="btn-primary" id="btnSaveConsulta" onclick="saveConsulta()">Guardar</button>
    <button class="btn-ghost" onclick="openAdd()">voltar</button>`;
  }
  else if(state.addStep==='beneficio-name'){
    html += `<div class="sheet-title">Qual o nome do benefício?</div>
    <input class="field-input" id="bName" aria-label="Nome do benefício" placeholder="ex: BPC" oninput="matchBenefit(this.value)" value="${esc(state.draft.typed||'')}">
    <div id="matchArea"></div>
    <button class="btn-ghost" onclick="openAdd()">voltar</button>`;
  }
  else if(state.addStep==='beneficio-cycle'){
    const cycleOptions = Array.from(new Set([1,2,3,4,5, state.draft.cycleYears].filter(Boolean))).sort((a,b)=>a-b);
    html += `<div class="sheet-title">De quanto em quanto tempo renova?</div>
    <div class="field-input" style="margin-bottom:4px">${state.draft.name}</div>
    ${state.draft.note ? `<div class="suggestion-box" style="margin-top:0"><div class="suggestion-sub">${state.draft.note}</div></div>` : ''}
    <div class="chip-row" id="cycleChips">
      ${cycleOptions.map(y=>`<div class="chip-choice ${state.draft.cycleYears===y?'on':''}" onclick="pickCycle(${y})">${y} ano${y>1?'s':''}</div>`).join('')}
    </div>
    <div class="field-label">Última renovação</div>
    <input class="field-input" type="date" id="bDate" aria-label="Data da última renovação">
    <button class="btn-primary" id="btnSaveBenefit" onclick="saveBenefit()">Anotar</button>
    <button class="btn-ghost" onclick="chooseType('beneficio')">voltar</button>`;
  }
  document.getElementById('sheet').innerHTML = html;
  a11yEnhance(document.getElementById('sheet'));
}

function matchBenefit(val){
  state.draft.typed = val;
  const low = val.toLowerCase().trim();
  const matches = KNOWN_BENEFITS.filter(b => b.aliases.some(a => a===low || (low.length>2 && a.includes(low))));
  const area = document.getElementById('matchArea');
  if(matches.length === 1){
    state.draft.matched = matches[0];
    area.innerHTML = `<div class="suggestion-box">
      <div class="suggestion-name">${matches[0].label}</div>
      <div class="suggestion-sub">${matches[0].note}</div>
      <button class="btn-primary" style="margin-top:10px" onclick="acceptMatch()">É esse</button>
    </div>`;
  } else if(matches.length > 1){
    area.innerHTML = `<div class="suggestion-sub" style="margin-top:8px">Pode ser um desses:</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:6px">
        ${matches.map((m,i)=>`<div class="choice-card" style="margin-bottom:0" onclick="acceptMatchIndex(${i})">
          <div class="choice-name" style="font-size:15px">${m.label}</div>
        </div>`).join('')}
      </div>
      <div style="margin-top:8px"><button class="btn-ghost" style="padding:6px 0" onclick="customBenefit()">Não é nenhum desses, continuar com "${val}"</button></div>`;
    state.draft.ambiguous = matches;
  } else if(val.length>1) {
    area.innerHTML = `<button class="btn-primary" style="margin-top:10px" onclick="customBenefit()">Continuar com "${esc(val)}"</button>`;
  } else {
    area.innerHTML = '';
  }
}
function acceptMatchIndex(i){
  state.draft.matched = state.draft.ambiguous[i];
  acceptMatch();
}
function acceptMatch(){
  state.draft.name = state.draft.matched.label.split(' — ')[0];
  state.draft.cycleYears = state.draft.matched.cycleYears;
  state.draft.note = state.draft.matched.note;
  state.addStep = 'beneficio-cycle';
  renderSheet();
}
function customBenefit(){
  state.draft.name = state.draft.typed;
  state.draft.cycleYears = null;
  state.addStep = 'beneficio-cycle';
  renderSheet();
}
function pickCycle(y){ state.draft.cycleYears = y; renderSheet(); }

function handlePhoto(evt, mode){
  const file = evt.target.files[0];
  if(!file) return;
  const isDoc = mode === 'documento';
  const maxW = isDoc ? 1600 : 640;
  const quality = isDoc ? 0.88 : 0.72;
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = function(){
      const scale = Math.min(1, maxW/img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width*scale;
      canvas.height = img.height*scale;
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      state.draft.photoData = canvas.toDataURL('image/jpeg',quality);
      renderSheet();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function saveDoc(){
  if(state.saving) return;
  const name = document.getElementById('docName').value.trim();
  if(!name) return;
  state.saving = true;
  const btn = document.getElementById('btnSaveDoc');
  if(btn){ btn.disabled = true; btn.textContent = 'Salvando...'; btn.style.opacity = '0.7'; }
  try{
    let photo_path = null;
    if(state.draft.photoData) photo_path = await uploadPhoto(state.draft.photoData, 'documento');
    const addedDate = new Date().toISOString();
    const row = await insertItem('documento', name, { addedDate, photo_path });
    if(row) state.items.push({ id: row.id, type:'documento', name, addedDate, photoData: photo_path ? await getSignedUrl(photo_path) : null });
    go('documentos');
  } finally { state.saving = false; }
}
async function saveConsulta(){
  if(state.saving) return;
  const subject = document.getElementById('cSubject').value.trim();
  const doctor = document.getElementById('cDoctor').value.trim();
  const date = document.getElementById('cDate').value;
  if(!subject || !date) return;
  state.saving = true;
  const btnC = document.getElementById('btnSaveConsulta');
  if(btnC){ btnC.disabled = true; btnC.textContent = 'Salvando...'; btnC.style.opacity = '0.7'; }
  try{
    let photo_path = null;
    if(state.draft.photoData) photo_path = await uploadPhoto(state.draft.photoData, 'consulta');
    const row = await insertItem('consulta', subject, { subject, doctor, date, photo_path });
    if(row) state.items.push({ id: row.id, type:'consulta', subject, doctor, date, photoData: photo_path ? await getSignedUrl(photo_path) : null });
    go('consultas');
  } finally { state.saving = false; }
}
async function saveBenefit(){
  if(state.saving) return;
  const date = document.getElementById('bDate').value;
  if(!date || !state.draft.cycleYears) return;
  state.saving = true;
  const btnB = document.getElementById('btnSaveBenefit');
  if(btnB){ btnB.disabled = true; btnB.textContent = 'Anotando...'; btnB.style.opacity = '0.7'; }
  try{
    const row = await insertItem('beneficio', state.draft.name, { name:state.draft.name, renewedDate:date, cycleYears:state.draft.cycleYears });
    if(row) state.items.push({ id: row.id, type:'beneficio', name:state.draft.name, renewedDate:date, cycleYears:state.draft.cycleYears });
    go('beneficios');
  } finally { state.saving = false; }
}

/* ---------- ONBOARDING ---------- */

  let html = `<div style="display:flex;justify-content:flex-end"><span style="font-size:13px;color:#6A6E60;cursor:pointer" onclick="go('hoje')">Pular</span></div>`;

function nextOnboarding(){
  if(state.onboardingStep===0){ state.onboardingStep=1; render(); }
  else { go('hoje'); }
}

/* ---------- RENDER ---------- */

function a11yEnhance(root){
  if(!root) return;
  root.querySelectorAll('[onclick]').forEach(el=>{
    if(el.tagName==='BUTTON' || el.tagName==='INPUT') return;
    if(!el.hasAttribute('tabindex')) el.setAttribute('tabindex','0');
    if(!el.hasAttribute('role') && !el.hasAttribute('aria-label')) el.setAttribute('role','button');
    else if(!el.hasAttribute('role')) el.setAttribute('role','button');
  });
}
document.addEventListener('keydown', function(e){
  if((e.key==='Enter' || e.key===' ') && e.target.hasAttribute && e.target.hasAttribute('onclick') && e.target.tagName!=='BUTTON' && e.target.tagName!=='INPUT'){
    e.preventDefault();
    e.target.click();
  }
});

function render(){
  const phone = document.getElementById('phone');
  phone.className = 'phone ' + (state.view==='beneficios' ? 'dark' : 'light');

  if(state.view==='onboarding') screenOnboarding();
  else if(state.view==='hoje') screenHoje();
  else if(state.view==='guardados') screenGuardados();
  else if(state.view==='documentos') screenDocumentos();
  else if(state.view==='documentoDetalhe') screenDocumentoDetalhe();
  else if(state.view==='consultas') screenConsultas();
  else if(state.view==='beneficios') screenBeneficios();

  if(state.view==='onboarding'){
    document.getElementById('navRow').innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;gap:14px;width:100%">
        <div style="display:flex;gap:6px">
          <div style="width:${state.onboardingStep===0?'22px':'7px'};height:7px;border-radius:4px;background:#3E5A44;transition:width .2s"></div>
          <div style="width:${state.onboardingStep===1?'22px':'7px'};height:7px;border-radius:4px;background:#3E5A44;transition:width .2s"></div>
        </div>
        <button class="btn-primary" style="margin-top:0" onclick="nextOnboarding()">${state.onboardingStep===0?'Continuar':'Vamos começar'}</button>
      </div>`;
    a11yEnhance(document.getElementById('content'));
    return;
  }

  const navActiveHoje = state.view==='hoje';
  document.getElementById('navRow').innerHTML = `
    <div class="nav-item ${navActiveHoje?'active':''}" onclick="go('hoje')">Hoje</div>
    <button class="fab" onclick="openAdd()" aria-label="Adicionar documento, benefício ou consulta">+</button>
    <div class="nav-item ${!navActiveHoje?'active':''}" onclick="go('guardados')">Guardados</div>
  `;
  a11yEnhance(document.getElementById('content'));
  a11yEnhance(document.getElementById('navRow'));
}

loadItems();
</script>
