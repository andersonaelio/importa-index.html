function esc(str){
  return String(str==null?'':str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---------- INSTALAR NO CELULAR ---------- */
let deferredInstallPrompt = null;
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
});

function promptInstall(){
  if(deferredInstallPrompt){
    deferredInstallPrompt.prompt();
    deferredInstallPrompt.userChoice.then(()=>{ deferredInstallPrompt = null; });
  } else if(isIOS){
    showIOSInstallSheet();
  } else {
    showIOSInstallSheet(true);
  }
}

function showIOSInstallSheet(generic){
  const sheet = document.getElementById('sheet');
  sheet.innerHTML = `<div class="sheet-handle"></div>

    <div class="card">

      : `<div class="card-note">Toque no ícone de compartilhar (□ com uma seta ↑) na barra do Safari, depois em "Adicionar à Tela de Início".</div>`}
    </div>

let state = { view: localStorage.getItem('importa_onboarded') ? 'carregando' : 'onboarding', onboardingStep:0, items:[], addStep:null, addType:null, draft:{} };

async function ensureAuth(){
  const { data: { session } } = await sb.auth.getSession();
  if(!session){
    const { error } = await sb.auth.signInAnonymously();
    if(error) console.error('erro de login anônimo', error);
    state.userEmail = null;
  } else {
    state.userEmail = (session.user && !session.user.is_anonymous) ? session.user.email : null;
  }
}

async function getSignedUrl(path){
  if(!path) return null;
  const { data, error } = await sb.storage.from('importa-fotos').createSignedUrl(path, 3600);
  if(error){ console.error('erro ao assinar url', error); return null; }
  return data.signedUrl;
}

async function uploadPhoto(dataUrl, prefix){
  try{
    const { data: { user } } = await sb.auth.getUser();
    const path = `${user.id}/${prefix}_${Date.now()}.jpg`;
    const blob = await (await fetch(dataUrl)).blob();
    const { error } = await sb.storage.from('importa-fotos').upload(path, blob, { contentType:'image/jpeg' });
    if(error){ console.error('erro ao subir foto', error); return null; }
    return path;
  } catch(e){ console.error('erro ao subir foto', e); return null; }
}

async function insertItem(tipo, nome, dados){
  const { data, error } = await sb.from('importa_itens').insert({ tipo, nome, dados }).select().single();
  if(error){ console.error('erro ao salvar', error); return null; }
  return data;
}

async function loadItems(){
  await ensureAuth();
  try{
    const { data, error } = await sb.from('importa_itens').select('*').order('criado_em', { ascending:true });
    if(error) throw error;
    state.items = await Promise.all((data||[]).map(async row=>{
      const item = { id: row.id, type: row.tipo, ...row.dados };
      if(row.tipo==='consulta') item.subject = row.nome;
      else item.name = row.nome;
      if(row.dados && row.dados.photo_path){ item.photoData = await getSignedUrl(row.dados.photo_path); }
      return item;
    }));
  } catch(e){ console.error('erro ao carregar itens', e); state.items = []; }
  if(state.view==='carregando') state.view = 'hoje';
  render();
}

function daysBetween(a,b){ return Math.round((b-a)/86400000); }
// Datas "só data" (ex: "2026-07-21", vindas de <input type=date>) não podem passar direto
// pro construtor Date() — ele interpreta como meia-noite UTC, e no fuso do Brasil (UTC-3)
// isso "volta" um dia na hora de exibir. Essa função sempre lê como meia-noite local.
function parseLocalDate(str){
  if(!str) return new Date(NaN);
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}
function addYears(date, years){ const d = typeof date==='string' ? parseLocalDate(date) : new Date(date); d.setFullYear(d.getFullYear()+years); return d; }
function fmtDate(d){ return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}); }
function fmtDateShort(d){ return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'}); }
// Junta a data formatada com a hora, se a pessoa preencheu (ex: "21 de jul. de 2026 às 14:00")
function fmtDateHora(formatted, time){ return time ? `${formatted} às ${time}` : formatted; }

function beneficios(){ return state.items.filter(i=>i.type==='beneficio'); }
function documentos(){ return state.items.filter(i=>i.type==='documento'); }
function consultas(){ return state.items.filter(i=>i.type==='consulta'); }

function ringDash(renewedDate, cycleYears){
  const total = cycleYears*365;
  const elapsed = Math.max(0, daysBetween(parseLocalDate(renewedDate), new Date()));
  const frac = Math.min(1, elapsed/total);
  const filled = Math.round((1-frac)*88);
  return `${filled} ${88-filled}`;
}
function nextRenewal(renewedDate, cycleYears){ return addYears(renewedDate, cycleYears); }

function go(view, extra){ state.view = view; state.viewExtra = extra; closeSheet(); render(); }

  const calmCount = state.items.length - (nextConsulta?1:0) - soonBens.length;

async function savePhotoToDevice(url, filename){
  try{
    const resp = await fetch(url);
    const blob = await resp.blob();
    const file = new File([blob], filename, { type: blob.type || 'image/jpeg' });
    if(navigator.canShare && navigator.canShare({ files:[file] })){
      await navigator.share({ files:[file] });
      return;
    }
  } catch(e){ console.error('erro ao compartilhar', e); }
  // fallback: abre a imagem numa aba pra pessoa segurar o dedo e salvar manualmente
  window.open(url, '_blank');
}

async function saveAsPDF(id){
  const d = state.items.find(i=>i.id===id);
  if(!d || !d.photoData) return;
  try{
    const img = new Image();
    img.crossOrigin = 'anonymous';
    await new Promise((resolve,reject)=>{ img.onload=resolve; img.onerror=reject; img.src=d.photoData; });

    const { jsPDF } = window.jspdf;
    const pageW = 210, pageH = 297; // A4 em mm
    const margin = 12;
    const maxW = pageW - margin*2, maxH = pageH - margin*2 - 14;
    const ratio = Math.min(maxW/img.width, maxH/img.height);
    const w = img.width*ratio, h = img.height*ratio;

    const doc = new jsPDF({ unit:'mm', format:'a4' });
    doc.setFontSize(14);
    doc.text(d.name || 'Documento', margin, margin);
    doc.setFontSize(9);
    doc.setTextColor(120);
    doc.text(`Importa — adicionado em ${fmtDate(new Date(d.addedDate))}`, margin, margin+6);
    doc.addImage(img, 'JPEG', margin, margin+12, w, h);

    const blob = doc.output('blob');
    const filename = `${(d.name||'documento').replace(/[^a-z0-9]/gi,'_')}.pdf`;
    const file = new File([blob], filename, { type:'application/pdf' });
    if(navigator.canShare && navigator.canShare({ files:[file] })){
      await navigator.share({ files:[file] });
      return;
    }
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 5000);
  } catch(e){ console.error('erro ao gerar pdf', e); }
}

async function deleteItem(id, backTo){
  const item = state.items.find(i=>i.id===id);
  const { error } = await sb.from('importa_itens').delete().eq('id', id);
  if(error){ console.error('erro ao excluir', error); return; }
  // Apaga a foto do Storage junto, senão fica orfã ocupando espaço do plano pra sempre.
  // Roda depois do delete do registro (que é o que importa pro usuário) e não bloqueia
  // a navegação se falhar — só loga, pra não travar a exclusão por causa da foto.
  if(item && item.photo_path){
    sb.storage.from('importa-fotos').remove([item.photo_path])
      .then(({error})=>{ if(error) console.error('erro ao apagar foto orfa', error); });
  }
  state.items = state.items.filter(i=>i.id!==id);
  go(backTo);
}

function matchBenefit(val){
  state.draft.typed = val;
  const low = val.toLowerCase().trim();
  const matches = KNOWN_BENEFITS.filter(b => b.aliases.some(a => a===low || (low.length>2 && a.includes(low))));
  const area = document.getElementById('matchArea');
  if(matches.length === 1){
    state.draft.matched = matches[0];
    area.innerHTML = `<div class="suggestion-box">
      <div class="suggestion-name">${matches[0].label}</div>
      <div class="suggestion-sub">${matches[0].note}</div>
      <button class="btn-primary" style="margin-top:10px" onclick="acceptMatch()">É esse</button>
    </div>`;
  } else if(matches.length > 1){
    area.innerHTML = `<div class="suggestion-sub" style="margin-top:8px">Pode ser um desses:</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-top:6px">
        ${matches.map((m,i)=>`<div class="choice-card" style="margin-bottom:0" onclick="acceptMatchIndex(${i})">
          <div class="choice-name" style="font-size:15px">${m.label}</div>
        </div>`).join('')}
      </div>
      <div style="margin-top:8px"><button class="btn-ghost" style="padding:6px 0" onclick="customBenefit()">Não é nenhum desses, continuar com "${val}"</button></div>`;
    state.draft.ambiguous = matches;
  } else if(val.length>1) {
    area.innerHTML = `<button class="btn-primary" style="margin-top:10px" onclick="customBenefit()">Continuar com "${esc(val)}"</button>`;
  } else {
    area.innerHTML = '';
  }
}
function acceptMatchIndex(i){
  state.draft.matched = state.draft.ambiguous[i];
  acceptMatch();
}
function acceptMatch(){
  state.draft.name = state.draft.matched.label.split(' — ')[0];
  state.draft.cycleYears = state.draft.matched.cycleYears;
  state.draft.note = state.draft.matched.note;
  state.addStep = 'beneficio-cycle';
  renderSheet();
}
function customBenefit(){
  state.draft.name = state.draft.typed;
  state.draft.cycleYears = null;
  state.addStep = 'beneficio-cycle';
  renderSheet();
}
function pickCycle(y){ state.draft.cycleYears = y; renderSheet(); }

function handlePhoto(evt, mode){
  const file = evt.target.files[0];
  if(!file) return;
  const isDoc = mode === 'documento';
  const maxW = isDoc ? 1600 : 640;
  const quality = isDoc ? 0.88 : 0.72;
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = function(){
      const scale = Math.min(1, maxW/img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width*scale;
      canvas.height = img.height*scale;
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      state.draft.photoData = canvas.toDataURL('image/jpeg',quality);
      renderSheet();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function saveDoc(){
  if(state.saving) return;
  const name = document.getElementById('docName').value.trim();

  state.saving = true;

  try{
    let photo_path = null;
    if(state.draft.photoData) photo_path = await uploadPhoto(state.draft.photoData, 'documento');
    const addedDate = new Date().toISOString();
    const row = await insertItem('documento', name, { addedDate, photo_path });
    if(row){
      state.items.push({ id: row.id, type:'documento', name, addedDate, photoData: photo_path ? await getSignedUrl(photo_path) : null });
      go('documentos');

async function saveBenefit(){
  if(state.saving) return;
  const date = document.getElementById('bDate').value;

  state.saving = true;
  const btnB = document.getElementById('btnSaveBenefit');
  if(btnB){ btnB.disabled = true; btnB.textContent = 'Anotando...'; btnB.style.opacity = '0.7'; }
  try{
    const row = await insertItem('beneficio', state.draft.name, { name:state.draft.name, renewedDate:date, cycleYears:state.draft.cycleYears });

function a11yEnhance(root){
  if(!root) return;
  root.querySelectorAll('[onclick]').forEach(el=>{
    if(el.tagName==='BUTTON' || el.tagName==='INPUT') return;
    if(!el.hasAttribute('tabindex')) el.setAttribute('tabindex','0');
    if(!el.hasAttribute('role') && !el.hasAttribute('aria-label')) el.setAttribute('role','button');
    else if(!el.hasAttribute('role')) el.setAttribute('role','button');
  });
}
document.addEventListener('keydown', function(e){
  if((e.key==='Enter' || e.key===' ') && e.target.hasAttribute && e.target.hasAttribute('onclick') && e.target.tagName!=='BUTTON' && e.target.tagName!=='INPUT'){
    e.preventDefault();
    e.target.click();
  }
});

function urlBase64ToUint8Array(base64String){
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

async function ativarLembretes(){
  const msg = document.getElementById('pushMsg');
  if(!('serviceWorker' in navigator) || !('PushManager' in window)){
    if(msg) msg.textContent = 'Seu navegador não suporta notificações. Tenta pelo Chrome ou Safari mais recente.';
    return;
  }
  if(msg) msg.textContent = 'Pedindo permissão...';
  try{
    const permission = await Notification.requestPermission();
    if(permission !== 'granted'){
      if(msg) msg.textContent = 'Sem permissão, não dá pra mandar lembrete. Você pode mudar isso nas configurações do navegador.';
      return;
    }
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
    const json = sub.toJSON();
    const { error } = await sb.from('importa_push_subscriptions').upsert({
      endpoint: json.endpoint,
      p256dh: json.keys.p256dh,
      auth_key: json.keys.auth
    }, { onConflict: 'endpoint' });
    if(error) throw error;
    state.pushAtivo = true;
    if(msg) msg.textContent = 'Lembretes ativados neste aparelho.';
    render();
  } catch(e){
    console.error('erro ao ativar lembretes', e);
    if(msg) msg.textContent = 'Não deu pra ativar agora. Tenta de novo em instantes.';
  }
}

async function checarPushAtivo(){
  try{
    if(!('serviceWorker' in navigator)) { state.pushAtivo = false; return; }
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.getSubscription();
    state.pushAtivo = !!sub;
  } catch(e){ state.pushAtivo = false; }
}

async function createAccount(){
  const email = document.getElementById('contaEmail').value.trim();
  const password = document.getElementById('contaSenha').value;
  const msg = document.getElementById('contaMsg');
  if(!email || password.length<6){ msg.textContent = 'Preenche e-mail e uma senha de pelo menos 6 letras/números.'; return; }
  const btn = document.getElementById('btnConta');
  btn.disabled = true; btn.textContent = 'Criando...';
  const { data, error } = await sb.auth.updateUser({ email, password });
  if(error){
    btn.disabled = false; btn.textContent = 'Criar minha conta';
    msg.textContent = 'Não deu: ' + error.message;
    return;
  }
  // O token da sessão anônima ainda diz is_anonymous=true — renova pra refletir a conta nova
  await sb.auth.refreshSession();
  const { data: userData } = await sb.auth.getUser();
  const user = userData && userData.user;
  if(user && user.email === email && !user.new_email){
    // confirmação de e-mail desligada: conta já vale agora
    state.userEmail = email;
    render(); // re-renderiza "Sua conta" já logada, sem precisar de refresh
  } else {
    // confirmação de e-mail ligada: fica pendente até clicar no link
    btn.disabled = false; btn.textContent = 'Criar minha conta';
    msg.textContent = 'Quase lá — confirme pelo link que mandamos no seu e-mail.';
  }
}

async function doSignIn(){
  const email = document.getElementById('contaEmail').value.trim();
  const password = document.getElementById('contaSenha').value;

  if(!email || !password){ msg.textContent = 'Preenche e-mail e senha.'; return; }

  btn.disabled = false; btn.textContent = 'Entrar';
  if(error){ msg.textContent = 'Não deu: ' + error.message; return; }
  await loadItems();
  go('hoje');
}

/* ---------- BOOT ----------
   Ordem importa: 1) se voltamos do Google com ?code=, troca o código pela sessão AQUI,
   antes de ensureAuth() — senão o signInAnonymously() cria uma sessão nova por cima e o
   login do Google "some" (era exatamente o bug). 2) só então carrega os itens.
   3) por último, listener de auth pra tela acompanhar login/logout sem refresh manual. */
async function boot(){
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/sw.js')
      .then(()=>checarPushAtivo().then(render))
      .catch(e=>console.error('erro ao registrar service worker', e));
  }
  render(); // mostra "carregando" imediatamente

  const params = new URLSearchParams(window.location.search);
  if(params.get('code')){
    try{
      const { error } = await sb.auth.exchangeCodeForSession(params.get('code'));
      if(error) throw error;
    } catch(e){
      console.error('erro ao concluir login com Google', e);
      state.oauthErro = 'Não deu pra concluir o login com Google. Tenta de novo?';
    }
    history.replaceState(null, '', window.location.pathname); // limpa ?code= da URL
  } else if(params.get('error')){
    console.error('Google devolveu erro:', params.get('error_description') || params.get('error'));
    state.oauthErro = 'O Google não deixou concluir o login. Tenta de novo?';
    history.replaceState(null, '', window.location.pathname);
  }

  await loadItems();

  if(state.oauthErro){ go('conta'); }

  // Mantém a tela em dia com a sessão (login, logout, conta criada) sem refresh manual.
  // Só re-renderiza quando o e-mail efetivamente muda, pra não apagar formulários no meio
  // da digitação (TOKEN_REFRESHED etc. ficam de fora).
  sb.auth.onAuthStateChange((event, session) => {
    if(event !== 'SIGNED_IN' && event !== 'SIGNED_OUT' && event !== 'USER_UPDATED') return;
    const email = (session && session.user && !session.user.is_anonymous) ? session.user.email : null;
    if(email === (state.userEmail || null)) return;
    state.userEmail = email;
    loadItems(); // troca de usuário = troca de dados; loadItems chama render() no fim
  });
}
boot();
